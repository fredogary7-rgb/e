<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Direct - NectarPro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(135deg,#0f0f0f,#1a1a2e,#16213e,#0f0f0f);min-height:100vh;display:flex;align-items:center;justify-content:center;font-style:italic;color:#fff}
.card{background:rgba(20,20,30,.9);backdrop-filter:blur(20px);border:1px solid rgba(229,9,20,.3);border-radius:24px;padding:40px;text-align:center;max-width:450px;width:90%;box-shadow:0 20px 60px rgba(229,9,20,.2)}
.logo{font-size:60px;font-weight:900;color:#e50914;letter-spacing:-2px;margin-bottom:8px}
.sub{font-size:14px;color:#aaa;margin-bottom:30px;font-weight:600}
.btn-enter{display:inline-flex;align-items:center;gap:10px;padding:18px 50px;background:#e50914;color:#fff;font-size:18px;font-weight:800;border:none;border-radius:50px;cursor:pointer;text-decoration:none;transition:all .3s ease;box-shadow:0 8px 30px rgba(229,9,20,.4)}
.btn-enter:hover{transform:translateY(-3px);box-shadow:0 15px 45px rgba(229,9,20,.6);background:#f40612}
.btn-back{display:inline-flex;align-items:center;gap:6px;margin-top:20px;color:#aaa;text-decoration:none;font-weight:600;font-size:13px;transition:all .3s}
.btn-back:hover{color:#fff}
.info{margin-top:24px;font-size:11px;color:#666}
</style>
</head>
<body>
<div class="card">
    <div class="logo">NETFLIX</div>
    <div class="sub">Accès direct à votre plateforme de streaming</div>
    <a href="https://net11.cc" target="_blank" class="btn-enter">
        <i class="fa fa-play"></i> Accéder à Netflix
    </a>
    <br>
    <a href="/dashboard" class="btn-back"><i class="fa fa-arrow-left"></i> Retour au tableau de bord</a>
    <div class="info">🔗 net11.cc — Redirection externe</div>
</div>
</body>
</html>
