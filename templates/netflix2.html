<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Netflix Direct - NovaTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;font-family:'Poppins',sans-serif;overflow-x:hidden;color:#fff}
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(229,9,20,.15) 0%,transparent 70%),radial-gradient(ellipse at 80% 20%,rgba(229,9,20,.08) 0%,transparent 50%),radial-gradient(ellipse at 20% 80%,rgba(100,0,10,.15) 0%,transparent 50%);animation:glow 4s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.8}50%{opacity:1}}
.nav{position:absolute;top:0;left:0;right:0;padding:20px 40px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:38px;color:#e50914;letter-spacing:3px;text-decoration:none;text-shadow:0 0 20px rgba(229,9,20,.5)}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-link{color:#bbb;text-decoration:none;font-size:13px;font-weight:600;transition:all .3s;font-style:italic}
.nav-link:hover{color:#fff}
.nav-link i{margin-right:5px}
.nav-avatar{width:36px;height:36px;border-radius:6px;background:linear-gradient(135deg,#e50914,#b81d24);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;cursor:pointer}
.main-card{position:relative;z-index:2;text-align:center;max-width:600px;padding:50px 40px;background:rgba(0,0,0,.7);backdrop-filter:blur(30px);border:1px solid rgba(229,9,20,.2);border-radius:20px;box-shadow:0 0 80px rgba(229,9,20,.15)}
.badge{display:inline-block;background:rgba(229,9,20,.2);color:#e50914;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:20px;border:1px solid rgba(229,9,20,.3)}
.badge i{margin-right:6px}
.title{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:4px;line-height:1;margin-bottom:6px}
.title span{color:#e50914}
.subtitle{font-size:15px;color:#bbb;font-weight:600;font-style:italic;margin-bottom:6px}
.desc{font-size:12px;color:#666;margin-bottom:30px;font-style:italic}
.btn-go{display:inline-flex;align-items:center;gap:12px;padding:16px 44px;background:#e50914;color:#fff;font-size:16px;font-weight:800;border:none;border-radius:8px;cursor:pointer;text-decoration:none;transition:all .3s ease;font-style:italic;letter-spacing:1px}
.btn-go:hover{background:#f40612;transform:scale(1.05);box-shadow:0 0 40px rgba(229,9,20,.5)}
.btn-go i{font-size:20px}
.features{position:relative;z-index:2;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:600px;margin-top:20px}
.feat{background:rgba(20,20,20,.8);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:18px;text-align:center;transition:all .3s}
.feat:hover{border-color:rgba(229,9,20,.3);transform:translateY(-3px)}
.feat i{font-size:22px;color:#e50914;margin-bottom:8px;display:block}
.feat span{font-size:11px;color:#999;font-weight:600;font-style:italic}
.floating{position:absolute;z-index:1;pointer-events:none;opacity:.12;animation:float 6s ease-in-out infinite}
.floating:nth-child(odd){animation-duration:8s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.bottom{position:absolute;bottom:30px;z-index:2;display:flex;gap:30px}
.bottom-item{display:flex;flex-direction:column;align-items:center;gap:4px;color:#555;font-size:10px;font-weight:600;font-style:italic}
.bottom-item i{font-size:16px;color:#333}
@media(max-width:600px){.nav{padding:15px 20px}.nav-logo{font-size:28px}.nav-links{gap:10px}.nav-link{font-size:11px}.main-card{padding:30px 20px}.title{font-size:40px}.features{grid-template-columns:1fr 1fr;gap:10px}}
</style>
</head>
<body>


<div class="hero">
<nav class="nav">
<a href="/dashboard" class="nav-logo">NOVATRADE</a>
<div class="nav-links">
<a href="/dashboard" class="nav-link"><i class="fa fa-home"></i> Accueil</a>
<a href="/market" class="nav-link"><i class="fa fa-store"></i> Market</a>
<a href="/taches" class="nav-link"><i class="fa fa-share-alt"></i> Tâches</a>
<div class="nav-avatar"><i class="fa fa-user"></i></div>
</div>
</nav>
<div class="floating" style="top:15%;left:10%"><i class="fab fa-youtube" style="font-size:40px"></i></div>
<div class="floating" style="top:20%;right:8%"><i class="fab fa-tiktok" style="font-size:36px"></i></div>
<div class="floating" style="top:60%;left:5%"><i class="fa fa-clapperboard" style="font-size:34px"></i></div>
<div class="floating" style="top:55%;right:10%"><i class="fab fa-instagram" style="font-size:38px"></i></div>
<div class="floating" style="top:80%;left:15%"><i class="fa fa-film" style="font-size:32px"></i></div>
<div class="floating" style="top:75%;right:6%"><i class="fab fa-spotify" style="font-size:35px"></i></div>
<div class="floating" style="top:35%;left:3%"><i class="fa fa-tv" style="font-size:42px"></i></div>
<div class="floating" style="top:40%;right:5%"><i class="fa fa-headphones" style="font-size:30px"></i></div>
<div class="main-card">
<div class="badge"><i class="fa fa-fire"></i> ACCÈS DIRECT</div>
<div class="title"><span>NETFLIX</span> DIRECT</div>
<div class="subtitle">🎬 Films • Séries • Documentaires • Animés</div>
<div class="desc">Profitez d'un accès illimité à votre plateforme de streaming</div>
<a href="https://net11.cc" target="_blank" class="btn-go"><i class="fa fa-play-circle"></i> Accéder maintenant</a>
</div>
<div class="features">
<div class="feat"><i class="fa fa-infinity"></i><span>Streaming Illimité</span></div>
<div class="feat"><i class="fa fa-mobile-screen"></i><span>Tous Écrans</span></div>
<div class="feat"><i class="fa fa-download"></i><span>Téléchargement</span></div>
</div>
<div class="bottom">
<div class="bottom-item"><i class="fa fa-shield-halved"></i><span>Sécurisé</span></div>
<div class="bottom-item"><i class="fa fa-bolt"></i><span>Rapide</span></div>
<div class="bottom-item"><i class="fa fa-globe"></i><span>net11.cc</span></div>
<div class="bottom-item"><i class="fa fa-clock"></i><span>24/7</span></div>
</div>
</div>
</body>
</html>
