<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Tâches - NovaTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Poppins',sans-serif;overflow:hidden;height:100vh;color:#fff}
.feed{height:100vh;overflow-y:scroll;scroll-snap-type:y mandatory}
.feed::-webkit-scrollbar{display:none}
.slide{position:relative;width:100%;height:100vh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:absolute;inset:0}
.bg img{width:100%;height:100%;object-fit:cover}
.bg .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:80px;opacity:.15}
.slide::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.15) 40%,rgba(0,0,0,.1) 100%)}
.actions{position:absolute;right:12px;bottom:140px;z-index:10;display:flex;flex-direction:column;align-items:center;gap:20px}
.act{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.act i{font-size:28px;color:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
.act span{font-size:10px;font-weight:700}.act.done i{color:#86efac}
.info{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 16px 100px 16px}
.info .vendor{font-size:11px;font-weight:700;opacity:.9;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.info .vendor i{color:#38bdf8}
.info .name{font-size:16px;font-weight:800;margin-bottom:4px;line-height:1.3}
.info .reward{font-size:14px;font-weight:800;color:#fbbf24;display:flex;align-items:center;gap:6px;margin-top:6px}
.btn{position:absolute;bottom:30px;left:16px;right:16px;z-index:10;height:50px;border-radius:25px;border:none;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;color:#fff}
.btn.go{background:linear-gradient(135deg,#38bdf8,#0ea5e9)}
.btn.ok{background:#22c55e}
.btn.wait{background:#f59e0b;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.progress{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(0,0,0,.6)}
.progress-bar{height:3px;background:linear-gradient(90deg,#38bdf8,#86efac);transition:width .4s}
.progress-text{display:flex;justify-content:space-between;padding:6px 16px;font-size:11px;font-weight:700}
.reward-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:#fff}

{% if not can_start %}
<div class="msg-overlay"><i class="fa {% if reward_amount %}fa-check-circle{% else %}fa-clock{% endif %}"></i><h2>{{ message[:60] }}</h2>{% if reward_amount %}<p style="font-size:32px;font-weight:900;color:#fbbf24">+{{ reward_amount|int }} FCFA</p>{% endif %}<a href="/dashboard"><i class="fa fa-arrow-left"></i> Retour</a></div>
{% else %}
<div class="progress"><div class="progress-bar" id="pb" style="width:{{ (shared_count/total*100)|int }}%"></div><div class="progress-text"><span>🎯 Tâches</span><span id="pt">{{ shared_count }}/{{ total }}</span></div></div>
<div class="feed" id="fd">
{% for t in taches %}
<div class="slide" id="s{{ t.task_id }}">
<div class="bg">{% if t.produit and t.produit.liste_images %}<img src="{{ t.produit.liste_images[0] if t.produit.liste_images[0].startswith('/') or t.produit.liste_images[0].startswith('http') else '/static/'+t.produit.liste_images[0] }}" alt="{{ t.produit.nom }}">{% else %}<div class="ph"><i class="fa fa-image"></i></div>{% endif %}</div>
<div class="actions"><div class="act{% if t.shared %} done{% endif %}" onclick="share({{ t.task_id }})"><i class="fa {% if t.shared %}fa-check-circle{% else %}fa-share-alt{% endif %}"></i><span>{% if t.shared %}Validé{% else %}Partager{% endif %}</span></div></div>
<div class="info"><div class="vendor"><i class="fa fa-store"></i> {{ t.boutique_nom }}</div><div class="name">{{ t.produit.nom if t.produit else 'Produit' }}</div><div class="reward"><i class="fa fa-coins"></i> Récompense</div></div>
<button class="btn{% if t.shared %} ok{% else %} go{% endif %}" id="b{{ t.task_id }}" onclick="share({{ t.task_id }})">{% if t.shared %}<i class="fa fa-check"></i> Validé{% else %}<i class="fa fa-share-alt"></i> Partager pour valider{% endif %}</button>
</div>
{% endfor %}
</div>
{% endif %}
<div class="reward-overlay" id="ro"><p style="font-size:18px;font-weight:700">🎉 Toutes les tâches validées !</p><div class="amount" id="ra">{{ estimated_reward }} FCFA</div><button class="claim-btn" id="bcl" onclick="claim()"><i class="fa fa-gift"></i> Réclamer</button></div>
<script>
let sc={{ shared_count }};const TT={{ total }};
function up(){const p=(sc/TT)*100;document.getElementById('pb').style.width=p+'%';document.getElementById('pt').textContent=sc+'/'+TT;if(sc>=TT)document.getElementById('ro').style.display='flex'}
function share(id){const b=document.getElementById('b'+id);if(b.classList.contains('ok')||b.classList.contains('wait'))return;const s=document.getElementById('s'+id);const n=s.querySelector('.name').textContent;const t='🔥 '+n+' - NovaTrade\n👉 '+window.location.origin+'/market';if(/Android|iPhone/i.test(navigator.userAgent))window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank');else if(navigator.share)navigator.share({title:n,text:t,url:window.location.origin+'/market'}).catch(()=>{});else navigator.clipboard.writeText(t).catch(()=>{});b.classList.add('wait');b.classList.remove('go');b.disabled=true;let sec=5;b.innerHTML='<i class="fa fa-hourglass"></i> '+sec+'s';let si=setInterval(()=>{sec--;if(sec<=0){clearInterval(si);b.classList.remove('wait');b.disabled=false;b.innerHTML='<i class="fa fa-check"></i> Confirmer';b.onclick=function(){done(id,b,s)}}else{b.innerHTML='<i class="fa fa-hourglass"></i> '+sec+'s'}},1000)}
function done(id,b,s){fetch('/api/share-task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:id})}).then(r=>r.json()).then(d=>{if(d.success){b.classList.add('ok');b.disabled=true;b.innerHTML='<i class="fa fa-check"></i> Validé';s.querySelector('.act').classList.add('done');s.querySelector('.act i').className='fa fa-check-circle';s.querySelector('.act span').textContent='Validé';sc=d.shared_count;up();const sl=document.querySelectorAll('.slide');const idx=Array.from(sl).indexOf(s);if(idx+1<sl.length)sl[idx+1].scrollIntoView({behavior:'smooth'})}})}
function claim(){const b=document.getElementById('bcl');if(b.disabled)return;b.disabled=true;b.innerHTML='<i class="fa fa-spinner fa-spin"></i>';fetch('/api/claim-task-reward',{method:'POST',headers:{'Content-Type':'application/json'}}).then(r=>r.json()).then(d=>{if(d.success){alert(d.message);location.reload()}else{alert(d.message);b.disabled=false;b.innerHTML='<i class="fa fa-gift"></i> Réclamer'}})}
</script>
</body>
</html>

.reward-overlay .amount{font-size:56px;font-weight:900;color:#fbbf24}
.reward-overlay .claim-btn{padding:16px 48px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:50px;font-size:18px;font-weight:800;cursor:pointer;animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 8px 30px rgba(245,158,11,.3)}50%{box-shadow:0 12px 45px rgba(245,158,11,.6)}}
.msg-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#fff;text-align:center;padding:40px}
.msg-overlay i{font-size:64px;margin-bottom:8px}
.msg-overlay h2{font-size:20px;font-weight:800}
.msg-overlay a{color:#38bdf8;text-decoration:none;font-weight:700;margin-top:12px}
</style>
</head>
<body>
