<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        :root {
            --primary: #5a57e3;
            --primary-dark: #4745c4;
            --secondary: #f5576c;
            --success: #009efd;
            --bg: #f8f9fe;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 32px;
            color: white;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .otp-input {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .otp-input input {
            width: 50px;
            height: 60px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            transition: all 0.2s;
            outline: none;
        }

        .otp-input input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(90, 87, 227, 0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .resend {
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-light);
        }

        .resend a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .resend a:hover {
            text-decoration: underline;
        }

        .flash {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flash.danger {
            background: rgba(245, 87, 108, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(245, 87, 108, 0.2);
        }

        .flash.success {
            background: rgba(0, 158, 253, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 158, 253, 0.2);
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .otp-input input { width: 40px; height: 50px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <i class="fa fa-shield-halved"></i>
            </div>
            
            <h1>Vérification</h1>
            <p class="subtitle">Entrez le code de vérification envoyé à votre adresse email</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">
                            <i class="fa {{ 'fa-exclamation-circle' if category == 'danger' else 'fa-check-circle' }}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" id="verifyForm">
                <div class="otp-input">
                    <input type="text" maxlength="1" name="otp_digit_1" class="otp-digit" autofocus>
                    <input type="text" maxlength="1" name="otp_digit_2" class="otp-digit">
                    <input type="text" maxlength="1" name="otp_digit_3" class="otp-digit">
                    <input type="text" maxlength="1" name="otp_digit_4" class="otp-digit">
                    <input type="text" maxlength="1" name="otp_digit_5" class="otp-digit">
                    <input type="text" maxlength="1" name="otp_digit_6" class="otp-digit">
                </div>
                
                <input type="hidden" name="code" id="codeInput">
                
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span class="btn-text">Vérifier</span>
                    <div class="loader" id="loader"></div>
                </button>
            </form>

            <div class="resend">
                Code non reçu ? <a href="#" onclick="resendCode()">Renvoyer le code</a>
            </div>
        </div>
    </div>

    <script>
        // Auto-focus sur les champs OTP
        const inputs = document.querySelectorAll('.otp-digit');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6);
                [...pastedData].forEach((char, i) => {
                    if (inputs[i]) inputs[i].value = char;
                });
                inputs[Math.min(pastedData.length, inputs.length - 1)].focus();
            });
        });

        // Formulaire de soumission
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            let code = '';
            inputs.forEach(input => code += input.value);
            
            if (code.length !== 6) {
                e.preventDefault();
                alert('Veuillez entrer les 6 chiffres du code');
                return false;
            }
            
            document.getElementById('codeInput').value = code;
            
            // Afficher le loader
            document.getElementById('submitBtn').disabled = true;
            document.querySelector('.btn-text').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
        });

        function resendCode() {
            alert('Un nouveau code a été envoyé à votre email');
        }
    </script>
</body>
</html>
