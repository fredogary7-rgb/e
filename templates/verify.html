<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification - NectarPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* RESET & BASE */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-card: rgba(255, 255, 255, 0.7);
            --accent-blue: #38bdf8;
            --accent-blue-light: #7dd3fc;
            --accent-green: #86efac;
            --accent-pink: #f9a8d4;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.2);
            --gradient-blue: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            --gradient-bg: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 30%, #fdf2f8 70%, #f0f9ff 100%);
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --shadow-medium: 0 8px 24px rgba(56, 189, 248, 0.12);
        }

        body {
            background: var(--gradient-bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-style: italic;
        }

        .verify-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-2xl);
            padding: 35px;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow-medium);
            text-align: center;
        }

        .header-box {
            background: var(--gradient-blue);
            margin: -35px -35px 25px -35px;
            padding: 25px;
            border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        .header-box .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .title-section h1 {
            font-style: italic;
            font-size: 22px;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .title-section p {
            font-style: italic;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .otp-input {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .otp-input input {
            width: 50px;
            height: 55px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            font-style: italic;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
            outline: none;
        }

        .otp-input input:focus {
            border-color: var(--accent-blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .btn-verify {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: var(--radius-lg);
            background: var(--gradient-blue);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-style: italic;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-verify:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }

        .btn-verify:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: rotation 0.8s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .resend {
            margin-top: 20px;
            font-style: italic;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .resend a {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
        }

        .resend a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            font-style: italic;
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .alert.danger {
            background: rgba(249, 168, 212, 0.15);
            color: #db2777;
            border: 1px solid rgba(249, 168, 212, 0.3);
        }

        .alert.success {
            background: rgba(134, 239, 172, 0.15);
            color: #16a34a;
            border: 1px solid rgba(134, 239, 172, 0.3);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .verify-card {
                padding: 25px 20px;
            }
            
            .header-box {
                margin: -25px -20px 20px -20px;
                padding: 20px;
            }
            
            .otp-input input {
                width: 40px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="verify-card">
        <div class="header-box">
            <div class="icon-box">
                <i class="fa fa-shield-halved"></i>
            </div>
        </div>

        <div class="title-section">
            <h1>Vérification</h1>
            <p>Entrez le code de vérification envoyé à votre adresse email</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" id="verifyForm">
            <div class="otp-input">
                <input type="text" maxlength="1" name="otp_digit_1" class="otp-digit" autofocus>
                <input type="text" maxlength="1" name="otp_digit_2" class="otp-digit">
                <input type="text" maxlength="1" name="otp_digit_3" class="otp-digit">
                <input type="text" maxlength="1" name="otp_digit_4" class="otp-digit">
                <input type="text" maxlength="1" name="otp_digit_5" class="otp-digit">
                <input type="text" maxlength="1" name="otp_digit_6" class="otp-digit">
            </div>
            
            <input type="hidden" name="code" id="codeInput">
            
            <button type="submit" class="btn-verify" id="submitBtn">
                <span id="btn-text">Vérifier</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div class="resend">
            Code non reçu ? <a href="#" onclick="resendCode()">Renvoyer le code</a>
        </div>
    </div>

    <script>
        // Auto-focus sur les champs OTP
        const inputs = document.querySelectorAll('.otp-digit');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6);
                [...pastedData].forEach((char, i) => {
                    if (inputs[i]) inputs[i].value = char;
                });
                inputs[Math.min(pastedData.length, inputs.length - 1)].focus();
            });
        });

        // Formulaire de soumission
        document.getElementById('verifyForm').addEventListener('submit', function(e) {
            let code = '';
            inputs.forEach(input => code += input.value);
            
            if (code.length !== 6) {
                e.preventDefault();
                alert('Veuillez entrer les 6 chiffres du code');
                return false;
            }
            
            document.getElementById('codeInput').value = code;
            
            // Afficher le loader
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('loader').style.display = 'inline-block';
        });

        function resendCode() {
            alert('Un nouveau code a été envoyé à votre email');
        }
    </script>
</body>
</html>
