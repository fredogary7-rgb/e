<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tâches - NovaTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:linear-gradient(135deg,#e0f2fe,#dcfce7,#fce7f3,#fef9c3,#e0f2fe);background-size:400% 400%;animation:bg 15s ease infinite;min-height:100vh;color:#334155;font-style:italic;font-weight:600}
@keyframes bg{0%{background-position:0 0}50%{background-position:100% 100%}100%{background-position:0 0}}
.container{max-width:700px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.header a{color:#38bdf8;text-decoration:none;font-size:20px;font-weight:700}
.header h1{font-size:22px;font-weight:800}
.ps{background:rgba(255,255,255,.85);border:1px solid rgba(148,163,184,.2);border-radius:20px;padding:22px;margin-bottom:20px;box-shadow:0 8px 24px rgba(56,189,248,.12)}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ph span{font-weight:700;font-size:15px}
.pc{font-size:28px;font-weight:800;color:#38bdf8}
.pw{background:rgba(56,189,248,.12);border-radius:12px;height:18px;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,#38bdf8,#86efac,#f9a8d4);background-size:200% 100%;animation:bs 2s linear infinite;border-radius:12px;transition:width .5s;width:0%}
@keyframes bs{0%{background-position:0 0}100%{background-position:200% 0}}
.pd .pf{background:linear-gradient(90deg,#86efac,#22c55e)}
.msg{background:rgba(255,255,255,.85);border:1px solid rgba(148,163,184,.2);border-radius:20px;padding:30px;text-align:center;margin-bottom:20px}
.msg i{font-size:48px;margin-bottom:12px;display:block;color:#38bdf8}
.tc{background:rgba(255,255,255,.85);border:1px solid rgba(148,163,184,.2);border-radius:18px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .3s}
.tc.sh{opacity:.5}
.tc:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(56,189,248,.12)}
.ti{width:70px;height:70px;border-radius:14px;background:rgba(56,189,248,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.ti img{width:100%;height:100%;object-fit:cover}
.ti i{font-size:28px}

{% if not can_start %}
<div class="msg"><i class="fa {% if reward_amount %}fa-check-circle{% else %}fa-clock{% endif %}"></i><h3>{{ message[:50] }}</h3></div>
{% else %}
<div class="ps{% if shared_count>=total %} pd{% endif %}" id="ps"><div class="ph"><span>Progression</span><span class="pc" id="pt">{{ shared_count }}/{{ total }}</span></div><div class="pw"><div class="pf" id="pb" style="width:{{ (shared_count/total*100)|int }}%"></div></div></div>
{% for t in taches %}
<div class="tc{% if t.shared %} sh{% endif %}" id="tc{{ t.task_id }}">
<div class="ti">{% if t.type=='publicite' %}<i class="fa fa-video" style="color:#f9a8d4"></i>{% elif t.image %}<img src="{{ t.image if t.image.startswith('/') or t.image.startswith('http') else '/static/'+t.image }}" alt="{{ t.nom }}">{% else %}<i class="fa fa-image" style="color:#38bdf8;opacity:.3"></i>{% endif %}</div>
<div style="flex:1;min-width:0"><div class="tn">{{ t.nom[:35] }}{% if t.nom|length>35 %}…{% endif %}</div><div class="tv"><i class="fa fa-store"></i> {{ t.boutique_nom }}</div><div class="tr"><i class="fa fa-coins"></i> Récompense</div></div>
<button class="bs{% if t.shared %} sh{% endif %}" id="bs{{ t.task_id }}" onclick="shareTask({{ t.task_id }})" {% if t.shared %}disabled{% endif %}><i class="fa {% if t.shared %}fa-check{% else %}fa-share-alt{% endif %}"></i> {{ 'Partagé' if t.shared else 'Partager' }}</button>
</div>
{% endfor %}
<div class="cs" id="cs" style="display:{{ 'block' if shared_count>=total else 'none' }}"><p class="rp">✨ Récompense estimée : <span>{{ estimated_reward }} FCFA</span></p><button class="bc" id="bc" onclick="claimReward()"><i class="fa fa-gift"></i> Réclamer</button></div>
{% endif %}
</div>
<script>
let sc={{ shared_count }};const tt={{ total }};
function up(){const p=(sc/tt)*100;document.getElementById('pb').style.width=p+'%';document.getElementById('pt').textContent=sc+'/'+tt;if(sc>=tt){document.getElementById('ps').classList.add('pd');document.getElementById('cs').style.display='block'}}
let st=null;
function shareTask(id){const b=document.getElementById('bs'+id);if(b.disabled||b.classList.contains('sh')||b.classList.contains('cd'))return;const c=document.getElementById('tc'+id);const n=c.querySelector('.tn').textContent;const t='🔥 '+n+' - NovaTrade\n👉 '+window.location.origin+'/market';if(/Android|iPhone/i.test(navigator.userAgent)){window.open('https://wa.me/?text='+encodeURIComponent(t),'_blank')}else if(navigator.share){navigator.share({title:n,text:t,url:window.location.origin+'/market'}).catch(()=>{})}else{navigator.clipboard.writeText(t).catch(()=>{})}
b.classList.add('cd');b.disabled=true;let s=5;b.innerHTML='<i class="fa fa-hourglass"></i> '+s+'s';st=setInterval(()=>{s--;if(s<=0){clearInterval(st);b.classList.remove('cd');b.disabled=false;b.innerHTML='<i class="fa fa-check"></i> Confirmer';b.onclick=function(){ms(id,b,c)}}else{b.innerHTML='<i class="fa fa-hourglass"></i> '+s+'s'}},1000)}
function ms(id,b,c){fetch('/api/share-task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:id})}).then(r=>r.json()).then(d=>{if(d.success){b.classList.add('sh');b.disabled=true;b.innerHTML='<i class="fa fa-check"></i> Partagé';c.classList.add('sh');sc=d.shared_count;up()}})}
function claimReward(){const b=document.getElementById('bc');if(b.disabled)return;b.disabled=true;b.innerHTML='<i class="fa fa-spinner fa-spin"></i>';fetch('/api/claim-task-reward',{method:'POST',headers:{'Content-Type':'application/json'}}).then(r=>r.json()).then(d=>{if(d.success){alert(d.message);location.reload()}else{alert(d.message);b.disabled=false;b.innerHTML='<i class="fa fa-gift"></i> Réclamer'}})}
</script>
</body>
</html>

.tn{font-weight:700;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tv{font-size:11px;color:#64748b;font-weight:600;margin-bottom:4px}
.tr{font-size:13px;font-weight:800;color:#f59e0b}
.bs{flex-shrink:0;padding:10px 20px;background:#38bdf8;color:#fff;border:none;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;transition:all .3s;font-style:italic;display:flex;align-items:center;gap:6px}
.bs:hover{background:#0ea5e9;transform:scale(1.05)}
.bs.sh{background:#86efac;color:#166534;cursor:default}
.bs.cd{background:#f59e0b}
.cs{text-align:center;margin-top:24px}
.bc{padding:16px 40px;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;border:none;border-radius:50px;font-weight:800;font-size:17px;cursor:pointer;font-style:italic;box-shadow:0 8px 30px rgba(245,158,11,.3);animation:cp 2s ease-in-out infinite}
@keyframes cp{0%,100%{box-shadow:0 8px 30px rgba(245,158,11,.3)}50%{box-shadow:0 12px 45px rgba(245,158,11,.6)}}
.rp{font-size:13px;color:#64748b;margin-top:10px;font-weight:600}
.rp span{color:#f59e0b;font-weight:800}
@media(max-width:600px){.container{padding:12px}.tc{padding:12px;gap:10px}.ti{width:55px;height:55px}.bs{padding:8px 14px;font-size:11px}}
</style>
</head>
<body>
<div class="container">
<div class="header"><a href="/dashboard"><i class="fa fa-arrow-left"></i></a><h1>🎯 Tâches Quotidiennes</h1></div>
