<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe - NectarPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global_modern.css') }}">
    <style>
        body { display: flex; justify-content: center; align-items: center; padding: 20px; }
        .reset-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-2xl);
            padding: 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-medium);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="header-box pink">
            <div class="icon-box">
                <i class="fa fa-lock"></i>
            </div>
        </div>

        <div class="title-section">
            <h1>Nouveau mot de passe</h1>
            <p>Créez votre nouveau mot de passe sécurisé</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" id="newPassForm">
            <div class="input-group">
                <label>Nouveau mot de passe</label>
                <div class="input-field">
                    <i class="fa fa-lock prefix-icon"></i>
                    <input type="password" id="newpass" name="new_password" placeholder="••••••••" required minlength="8">
                    <i class="fa fa-eye password-toggle" onclick="togglePassword('newpass')"></i>
                </div>
            </div>

            <div class="input-group">
                <label>Confirmation</label>
                <div class="input-field">
                    <i class="fa fa-lock prefix-icon"></i>
                    <input type="password" id="confirmpass" name="confirm_password" placeholder="••••••••" required>
                    <i class="fa fa-eye password-toggle" onclick="togglePassword('confirmpass')"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary btn-pink" id="submitBtn">
                <span id="btn-text">Définir le mot de passe</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <a href="{{ url_for('connexion_page') }}" class="link-blue" style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px;">
            <i class="fa fa-arrow-left"></i>
            Retour à la connexion
        </a>
    </div>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        document.getElementById('newPassForm').addEventListener('submit', function(e) {
            const newPass = document.getElementById('newpass').value;
            const confirmPass = document.getElementById('confirmpass').value;

            if (newPass.length < 8) {
                e.preventDefault();
                alert('Le mot de passe doit contenir au moins 8 caractères');
                return false;
            }

            if (newPass !== confirmPass) {
                e.preventDefault();
                alert('Les mots de passe ne correspondent pas');
                return false;
            }

            document.getElementById('submitBtn').disabled = true;
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('loader').style.display = 'inline-block';
        });
    </script>
</body>
</html>
