<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer une boutique - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        :root {
            --primary: #5a57e3;
            --primary-dark: #4745c4;
            --secondary: #f5576c;
            --success: #009efd;
            --bg: #f8f9fe;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 20px;
            box-shadow: var(--shadow-lg);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            background: var(--card-bg);
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(90, 87, 227, 0.1);
        }

        .form-group textarea {
            height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-lg);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(90, 87, 227, 0.3);
        }

        .flash {
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 15px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .flash.success {
            background: rgba(0, 158, 253, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 158, 253, 0.2);
        }

        .flash.error {
            background: rgba(245, 87, 108, 0.1);
            color: var(--secondary);
            border: 1px solid rgba(245, 87, 108, 0.2);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            background: rgba(90, 87, 227, 0.1);
            border-radius: var(--radius-sm);
            transition: all 0.2s;
        }

        .back-link:hover {
            background: rgba(90, 87, 227, 0.2);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">
                    <i class="fa fa-store"></i>
                </div>
                <h1>Créer une boutique</h1>
                <p>Lancez votre activité e-commerce sur NovaTrade</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ 'success' if category == 'success' else 'error' }}">
                            <i class="fa {{ 'fa-check-circle' if category == 'success' else 'fa-exclamation-circle' }}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('creer_boutique') }}">
                <div class="form-group">
                    <label for="nom"><i class="fa fa-tag"></i> Nom de la boutique *</label>
                    <input type="text" id="nom" name="nom" required placeholder="Ex: Ma Boutique Mode">
                </div>

                <div class="form-group">
                    <label for="description"><i class="fa fa-align-left"></i> Description</label>
                    <textarea id="description" name="description" placeholder="Décrivez votre boutique..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email"><i class="fa fa-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" placeholder="contact@boutique.com">
                    </div>
                    <div class="form-group">
                        <label for="whatsapp"><i class="fab fa-whatsapp"></i> WhatsApp</label>
                        <input type="text" id="whatsapp" name="whatsapp" placeholder="+225 07 07 07 07 07">
                    </div>
                </div>

                <div class="form-group">
                    <label for="adresse"><i class="fa fa-map-marker-alt"></i> Adresse</label>
                    <input type="text" id="adresse" name="adresse" placeholder="Ex: Rue des Commerces">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="ville"><i class="fa fa-city"></i> Ville</label>
                        <input type="text" id="ville" name="ville" placeholder="Ex: Abidjan">
                    </div>
                    <div class="form-group">
                        <label for="pays"><i class="fa fa-flag"></i> Pays</label>
                        <input type="text" id="pays" name="pays" placeholder="Ex: Côte d'Ivoire">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="latitude"><i class="fa fa-location-arrow"></i> Latitude</label>
                        <input type="text" id="latitude" name="latitude" placeholder="5.3600">
                    </div>
                    <div class="form-group">
                        <label for="longitude"><i class="fa fa-location-arrow"></i> Longitude</label>
                        <input type="text" id="longitude" name="longitude" placeholder="-4.0083">
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa fa-plus-circle"></i> Créer ma boutique
                </button>
            </form>
        </div>

        <a href="{{ url_for('dashboard_page') }}" class="back-link">
            <i class="fa fa-arrow-left"></i>
            Retour au tableau de bord
        </a>
    </div>
</body>
</html>
