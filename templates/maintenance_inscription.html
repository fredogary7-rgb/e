<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bientôt disponible - NectarPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* RESET & BASE */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        
        :root {
            --bg-primary: #f8fafc;
            --bg-secondary: rgba(255, 255, 255, 0.8);
            --bg-card: rgba(255, 255, 255, 0.7);
            --accent-blue: #38bdf8;
            --accent-blue-light: #7dd3fc;
            --accent-green: #86efac;
            --accent-pink: #f9a8d4;
            --accent-purple: #a78bfa;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: rgba(148, 163, 184, 0.2);
            --gradient-blue: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 100%);
            --gradient-pink: linear-gradient(135deg, #fbcfe8 0%, #f9a8d4 100%);
            --gradient-purple: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 100%);
            --gradient-green: linear-gradient(135deg, #bbf7d0 0%, #86efac 100%);
            --gradient-bg: linear-gradient(135deg, #f0f9ff 0%, #f0fdf4 30%, #fdf2f8 70%, #f0f9ff 100%);
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-2xl: 24px;
            --shadow-medium: 0 8px 24px rgba(56, 189, 248, 0.12);
        }

        body {
            background: var(--gradient-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            font-style: italic;
            color: var(--text-primary);
        }

        /* Background animated */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            background: var(--accent-blue);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            background: var(--accent-pink);
            bottom: -50px;
            right: -50px;
            animation-delay: 5s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            background: var(--accent-green);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(40px, 40px) scale(1.05); }
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-2xl);
            padding: 50px 40px;
            box-shadow: var(--shadow-medium);
        }

        .logo {
            width: 100px;
            height: 100px;
            background: var(--gradient-blue);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(56, 189, 248, 0); }
        }

        h1 {
            font-style: italic;
            font-size: 32px;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 15px;
        }

        .subtitle {
            font-style: italic;
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .countdown-item {
            background: rgba(56, 189, 248, 0.05);
            border-radius: var(--radius-lg);
            padding: 20px;
            min-width: 100px;
        }

        .countdown-value {
            font-style: italic;
            font-size: 36px;
            font-weight: 900;
            color: var(--accent-blue);
            display: block;
        }

        .countdown-label {
            font-style: italic;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature {
            padding: 20px;
            background: rgba(56, 189, 248, 0.05);
            border-radius: var(--radius-lg);
            transition: all 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-medium);
            background: rgba(56, 189, 248, 0.1);
        }

        .feature i {
            font-size: 28px;
            color: var(--accent-blue);
            margin-bottom: 10px;
        }

        .feature h3 {
            font-style: italic;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .feature p {
            font-style: italic;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .notify-form {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }

        .notify-form input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            font-style: italic;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.8);
        }

        .notify-form input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: var(--radius-lg);
            font-style: italic;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--gradient-blue);
            color: white;
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }

        .social-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            background: rgba(56, 189, 248, 0.05);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-blue);
            font-size: 18px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .social-links a:hover {
            background: var(--gradient-blue);
            color: white;
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 26px; }
            .countdown { gap: 10px; }
            .countdown-item { min-width: 70px; padding: 15px 10px; }
            .countdown-value { font-size: 24px; }
            .notify-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <i class="fa fa-rocket"></i>
            </div>
            
            <h1>Bientôt disponible !</h1>
            <p class="subtitle">
                Les inscriptions ouvriront le <strong>11 Avril 2026 à 12h00</strong>.<br>
                Préparez-vous à rejoindre la révolution NectarPro !
            </p>

            <div class="countdown" id="countdown">
                <div class="countdown-item">
                    <span class="countdown-value" id="days">00</span>
                    <span class="countdown-label">Jours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="hours">00</span>
                    <span class="countdown-label">Heures</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="minutes">00</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="seconds">00</span>
                    <span class="countdown-label">Secondes</span>
                </div>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fa fa-coins"></i>
                    <h3>Gains Quotidiens</h3>
                    <p>Gagnez chaque jour</p>
                </div>
                <div class="feature">
                    <i class="fa fa-users"></i>
                    <h3>Parrainage</h3>
                    <p>Commission sur 3 niveaux</p>
                </div>
                <div class="feature">
                    <i class="fa fa-bolt"></i>
                    <h3>Retraits Rapides</h3>
                    <p>Paiements instantanés</p>
                </div>
            </div>

            <form class="notify-form" onsubmit="event.preventDefault(); alert('Merci ! Vous serez notifié.');">
                <input type="email" placeholder="Votre email pour être notifié" required>
                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-bell"></i>
                    M'avertir
                </button>
            </form>

            <div class="social-links">
                <a href="#"><i class="fa-brands fa-telegram"></i></a>
                <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Compte à rebours
        const launchDate = new Date('April 11, 2026 12:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="countdown-value" style="color: var(--accent-green);">OUVERT !</div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
