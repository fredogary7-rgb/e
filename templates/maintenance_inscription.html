<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bientôt disponible - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        :root {
            --primary: #5a57e3;
            --primary-dark: #4745c4;
            --secondary: #f5576c;
            --success: #009efd;
            --bg: #f8f9fe;
            --card-bg: #ffffff; 
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Background animated */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            background: var(--secondary);
            bottom: -50px;
            right: -50px;
            animation-delay: 5s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            background: var(--success);
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, -50px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(40px, 40px) scale(1.05); }
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 50px 40px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(90, 87, 227, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(90, 87, 227, 0); }
        }

        h1 {
            font-size: 32px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .countdown-item {
            background: linear-gradient(135deg, rgba(90, 87, 227, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: var(--radius-sm);
            padding: 20px;
            min-width: 100px;
        }

        .countdown-value {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
            display: block;
        }

        .countdown-label {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .feature {
            padding: 20px;
            background: var(--bg);
            border-radius: var(--radius-sm);
            transition: all 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .feature i {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .feature h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px;
        }

        .feature p {
            font-size: 12px;
            color: var(--text-light);
        }

        .notify-form {
            display: flex;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }

        .notify-form input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .notify-form input:focus {
            border-color: var(--primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .social-links {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-links a {
            width: 45px;
            height: 45px;
            background: var(--bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 18px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .social-links a:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 26px; }
            .countdown { gap: 10px; }
            .countdown-item { min-width: 70px; padding: 15px 10px; }
            .countdown-value { font-size: 24px; }
            .notify-form { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <i class="fa fa-rocket"></i>
            </div>
            
            <h1>Bientôt disponible !</h1>
            <p class="subtitle">
                Les inscriptions ouvriront le <strong>11 Avril 2026 à 12h00</strong>.<br>
                Préparez-vous à rejoindre la révolution NovaTrade !
            </p>

            <div class="countdown" id="countdown">
                <div class="countdown-item">
                    <span class="countdown-value" id="days">00</span>
                    <span class="countdown-label">Jours</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="hours">00</span>
                    <span class="countdown-label">Heures</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="minutes">00</span>
                    <span class="countdown-label">Minutes</span>
                </div>
                <div class="countdown-item">
                    <span class="countdown-value" id="seconds">00</span>
                    <span class="countdown-label">Secondes</span>
                </div>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fa fa-coins"></i>
                    <h3>Gains Quotidiens</h3>
                    <p>Gagnez chaque jour</p>
                </div>
                <div class="feature">
                    <i class="fa fa-users"></i>
                    <h3>Parrainage</h3>
                    <p>Commission sur 3 niveaux</p>
                </div>
                <div class="feature">
                    <i class="fa fa-bolt"></i>
                    <h3>Retraits Rapides</h3>
                    <p>Paiements instantanés</p>
                </div>
            </div>

            <form class="notify-form" onsubmit="event.preventDefault(); alert('Merci ! Vous serez notifié.');">
                <input type="email" placeholder="Votre email pour être notifié" required>
                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-bell"></i>
                    M'avertir
                </button>
            </form>

            <div class="social-links">
                <a href="#"><i class="fa-brands fa-telegram"></i></a>
                <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>
    </div>

    <script>
        // Compte à rebours
        const launchDate = new Date('April 11, 2026 12:00:00').getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            if (distance < 0) {
                document.getElementById('countdown').innerHTML = '<div class="countdown-value" style="color: var(--success);">OUVERT !</div>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
